<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Movimiento registrado</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div th:replace="~{sidebar :: sidebar}"></div>
<div class="main-content">
  <img src="/img/admin.jpg" class="perfil-img" alt="Perfil"/>
  <h1 style="font-size:2.5em; font-weight:bold; text-align:center;">
    Movimiento registrado
  </h1>
  <p style="text-align:center;">El movimiento de stock fue registrado correctamente.</p>
  <h2 style="font-size:2em; font-weight:bold; text-align:center;">
    Detalle del movimiento:
  </h2>
  <ul style="margin: 0 auto; width: fit-content;">
    <li th:text="'Producto: ' + ${movimiento.producto.nombre}"></li>
    <li th:text="'Tipo: ' + ${movimiento.tipoMovimiento}"></li>
    <li th:text="'Cantidad: ' + ${movimiento.cantidad}"></li>
    <li th:text="'Fecha: ' + ${#temporals.format(movimiento.fechaHora, 'dd/MM/yyyy HH:mm')}"></li>
  </ul>
  <div style="text-align:center;">
    <a th:href="@{/movimientos}" class="btn-agregar">Volver</a>
  </div>
</div>
</body>
</html>
