<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Usuarios</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="usuarios-bg">
<div th:replace="~{sidebar :: sidebar}"></div>
<div class="main-content" style="background:url('/') center center / cover no-repeat;">
    <img src="/img/admin.jpg" class="perfil-img" alt="Perfil"/>
    <div class="tabla-usuarios">
        <h1 class="titulo-usuarios">Gestión de Usuarios</h1>
        <table>
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Rol</th>
                <th>Contraseña</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="usuario : ${usuarios}">
                <td th:text="${usuario.nombreUsuario}"></td>
                <td th:text="${usuario.rol}"></td>
                <td th:text="${usuario.contraseña}"></td>
                <td>
                    <span th:if="${usuarioLogueado.rol == 'admin'}">
                        <a class="btn-modificar" th:href="@{/usuarios/editar/{id}(id=${usuario.id})}">Modificar</a>
                        <a class="btn-eliminar" th:href="@{/usuarios/eliminar/{id}(id=${usuario.id})}">Eliminar</a>
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <form class="form-usuario" th:if="${usuarioLogueado.rol == 'admin'}" th:action="@{/usuarios}" th:object="${usuario}" method="post">
        <input type="text" th:field="*{nombreUsuario}" placeholder="Nombre" />
        <select th:field="*{rol}" required>
            <option value="" disabled selected>Selecciona un rol</option>
            <option value="admin">Admin</option>
            <option value="logistico">Logístico</option>
        </select>
        <input type="password" th:field="*{contraseña}" placeholder="Contraseña" />
        <button type="submit" class="btn-agregar">Agregar</button>
    </form>
</div>
</body>
</html>
