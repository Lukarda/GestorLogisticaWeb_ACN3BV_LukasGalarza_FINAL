<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Incidencia enviada</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div th:replace="~{sidebar :: sidebar}"></div>
<div class="main-content">
    <img src="/img/admin.jpg" class="perfil-img" alt="Perfil"/>
    <h1 style="text-align:center; font-size:2.5em; font-weight:bold;">Incidencia enviada</h1>
    <p style="text-align:center;">Tu incidencia fue reportada y está pendiente de revisión por el administrador.</p>
    <h2 style="text-align:center; font-size:2em; font-weight:bold;">Producto reportado:</h2>
    <ul style="margin: 0 auto; width: fit-content;">
        <li th:if="${incidencia != null}" th:text="${incidencia.producto.tipo + ' - ' + incidencia.producto.nombre}"></li>
    </ul>
    <div style="text-align:center;">
        <a th:href="@{/productos}">Volver</a>
    </div>
</div>
</body>
</html>
